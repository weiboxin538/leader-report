<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<title>网格长个人看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh}
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,0.85);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center}
.login-box h2{font-size:20px;color:#1e293b;margin-bottom:6px}
.login-box p{font-size:13px;color:#64748b;margin-bottom:24px}
.login-box input{width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:18px;text-align:center;letter-spacing:8px;outline:none;transition:border-color .2s}
.login-box input:focus{border-color:#3b82f6}
.login-box .btn{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;transition:background .2s}
.login-box .btn:hover{background:#1d4ed8}
.login-box .btn:disabled{background:#94a3b8;cursor:not-allowed}
.login-box .err{color:#dc2626;font-size:12px;margin-top:10px;min-height:18px}
.login-box .lock-msg{color:#f59e0b;font-size:12px;margin-top:8px}
.dashboard{display:none;padding:20px;max-width:1200px;margin:0 auto}
.dash-header{background:#fff;border-radius:12px;padding:20px 28px;margin-bottom:16px;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
.dash-header .left h1{font-size:20px;font-weight:700;color:#1e293b}
.dash-header .left .sub{font-size:13px;color:#64748b;margin-top:4px}
.dash-header .right{text-align:right}
.dash-header .right .rank{font-size:24px;font-weight:800;color:#2563eb}
.dash-header .right .rank-label{font-size:12px;color:#64748b}
.date-filter{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px;border:1px solid #e2e8f0}
.date-filter .title{font-size:13px;font-weight:600;color:#475569;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.date-filter .title .select-all{font-size:11px;color:#2563eb;cursor:pointer;padding:3px 8px;border:1px solid #2563eb;border-radius:4px}
.date-tags{display:flex;flex-wrap:wrap;gap:6px}
.date-tag{padding:6px 12px;border-radius:6px;border:1px solid #e2e8f0;font-size:12px;color:#475569;cursor:pointer;transition:all .15s;user-select:none}
.date-tag.active{background:#2563eb;color:#fff;border-color:#2563eb}
.date-tag:hover:not(.active){background:#f1f5f9}


.summary-row{display:none}
.sum-card{display:none}
.data-table-wrap{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:#1e3054;color:#e2e8f0;padding:11px 10px;font-size:11px;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:5;cursor:pointer;user-select:none}
.data-table th:hover{background:#263d66}
.data-table td{padding:9px 10px;border-bottom:1px solid #f1f5f9;text-align:center;white-space:nowrap}
.data-table tbody tr:nth-child(even){background:#fafbfc}
.data-table tbody tr:hover{background:#eff6ff}
.data-table td.name-col{text-align:left;font-weight:600;color:#0f172a;padding-left:14px}
.data-table td.leader-col{text-align:left;font-weight:500;color:#475569;padding-left:14px}
.data-table td.city-col{text-align:left;color:#475569;padding-left:14px}
.logout-btn{padding:6px 14px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;color:#64748b;cursor:pointer;background:#fff;transition:all .15s}
.logout-btn:hover{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.sort-arrow{font-size:9px;margin-left:3px;opacity:0.5}
.sort-arrow.active{opacity:1}
/* 日期下拉多选 */
.date-dropdown{position:relative;display:inline-block}
.date-dropdown .dd-btn{padding:8px 16px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;font-size:13px;color:#1e293b;cursor:pointer;display:flex;align-items:center;gap:6px;min-width:160px}
.date-dropdown .dd-btn:hover{border-color:#93c5fd}
.date-dropdown .dd-btn .arrow{font-size:10px;color:#94a3b8;margin-left:auto}
.dd-panel{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:100;min-width:280px;max-height:320px;overflow-y:auto;display:none;padding:8px 0}
.dd-panel.show{display:block}
.dd-panel .dd-item{display:flex;align-items:center;padding:7px 14px;font-size:12px;color:#475569;cursor:pointer;transition:background .1s}
.dd-panel .dd-item:hover{background:#f1f5f9}
.dd-panel .dd-item input{margin-right:8px;accent-color:#2563eb}
.dd-panel .dd-item.all-item{border-bottom:1px solid #e2e8f0;font-weight:600;color:#1e293b;padding-bottom:10px;margin-bottom:4px}

</style></head><body>
<div class="login-overlay" id="loginOverlay">
<div class="login-box">
<h2>网格长个人看板</h2>
<p>请输入6位密码查看数据</p>
<input type="password" id="pwdInput" maxlength="6" placeholder="------" autocomplete="off">
<button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
<div class="err" id="errMsg"></div>
<div class="lock-msg" id="lockMsg"></div>
</div></div>
<div class="dashboard" id="dashboard">
<div class="dash-header"><div class="left"><h1 id="dashTitle"></h1><div class="sub" id="dashSub"></div></div>
<div class="right"><div class="rank" id="dashRank"></div><div class="rank-label" id="dashRankLabel"></div>
<button class="logout-btn" onclick="doLogout()" style="margin-top:8px">退出登录</button>
</div></div>
<div class="date-filter"><div class="title"><span>日期筛选</span></div>
<div class="date-dropdown" id="dateDropdown"><button class="dd-btn" onclick="toggleDropdown()"><span id="ddLabel">全部日期</span><span class="arrow">▼</span></button>
<div class="dd-panel" id="ddPanel"></div></div></div>
<div class="data-table-wrap"><table class="data-table" id="dataTable"></table></div>
</div>

function decodeData() {
  if (allRecords) return;
  var bin = atob(DATA_B64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  var decompressed = pako.inflate(bytes, {to: "string"});
  allRecords = JSON.parse(decompressed);
}

// Pure JS SHA-256 fallback for file:// protocol (crypto.subtle not available)
function sha256js(str) {
  function rr(n,x){return(x>>>n)|(x<<(32-n));}
  function ch(x,y,z){return(x&y)^((~x)&z);}
  function maj(x,y,z){return(x&y)^(x&z)^(y&z);}
  function sig0(x){return rr(2,x)^rr(13,x)^rr(22,x);}
  function sig1(x){return rr(6,x)^rr(11,x)^rr(25,x);}
  function gam0(x){return rr(7,x)^rr(18,x)^(x>>>3);}
  function gam1(x){return rr(17,x)^rr(19,x)^(x>>>10);}
  var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  var utf8=[];
  for(var i=0;i<str.length;i++){
    var c=str.charCodeAt(i);
    if(c<128)utf8.push(c);
    else if(c<2048){utf8.push(192|(c>>6));utf8.push(128|(c&63));}
    else{utf8.push(224|(c>>12));utf8.push(128|((c>>6)&63));utf8.push(128|(c&63));}
  }
  var msg=utf8;var l=msg.length*8;
  msg.push(0x80);
  while(msg.length%64!==56)msg.push(0);
  msg.push(0,0,0,0);
  msg.push((l>>>24)&0xff,(l>>>16)&0xff,(l>>>8)&0xff,l&0xff);
  var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  for(var b=0;b<msg.length;b+=64){
    var w=[];
    for(var j=0;j<16;j++)w[j]=(msg[b+j*4]<<24)|(msg[b+j*4+1]<<16)|(msg[b+j*4+2]<<8)|msg[b+j*4+3];
    for(var j=16;j<64;j++)w[j]=(gam1(w[j-2])+w[j-7]+gam0(w[j-15])+w[j-16])|0;
    var a=H[0],bb=H[1],cc=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
    for(var j=0;j<64;j++){
      var t1=(h+sig1(e)+ch(e,f,g)+K[j]+w[j])|0;
      var t2=(sig0(a)+maj(a,bb,cc))|0;
      h=g;g=f;f=e;e=(d+t1)|0;d=cc;cc=bb;bb=a;a=(t1+t2)|0;
    }
    H[0]=(H[0]+a)|0;H[1]=(H[1]+bb)|0;H[2]=(H[2]+cc)|0;H[3]=(H[3]+d)|0;
    H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
  }
  var hex="";
  for(var i=0;i<8;i++){
    for(var j=28;j>=0;j-=4)hex+="0123456789abcdef".charAt((H[i]>>>j)&0xf);
  }
  return hex;
}

async function sha256prefix(str) {
  if (window.crypto && window.crypto.subtle) {
    try {
      var buf = new TextEncoder().encode(str);
      var hash = await crypto.subtle.digest("SHA-256", buf);
      var arr = Array.from(new Uint8Array(hash));
      var hex = arr.map(function(b) { return b.toString(16).padStart(2, "0"); }).join("");
      return hex.substring(0, 12);
    } catch(e) {}
  }
  // Fallback for file:// protocol
  var hex = sha256js(str);
  return hex.substring(0, 12);
}

async function doLogin() {
  var now = Date.now();
  if (now < lockUntil) {
    var sec = Math.ceil((lockUntil - now) / 1000);
    document.getElementById("lockMsg").textContent = "已锁定，请等待 " + sec + " 秒";
    return;
  }
  var pwd = document.getElementById("pwdInput").value.trim();
  if (pwd.length !== 6) {
    document.getElementById("errMsg").textContent = "请输入6位密码";
    return;
  }
  var h = await sha256prefix(pwd);
  if (pwdMap[h]) {
    failCount = 0;
    currentUser = pwdMap[h];
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    decodeData();
    renderDashboard();
  } else {
    failCount++;
    document.getElementById("errMsg").textContent = "密码错误 (" + failCount + "/5)";
    if (failCount >= 5) {
      var lockSec = 60 * Math.ceil(failCount / 5);
      lockUntil = now + lockSec * 1000;
      document.getElementById("lockMsg").textContent = "连续错误5次，锁定" + lockSec + "秒";
      document.getElementById("loginBtn").disabled = true;
      setTimeout(function() {
        document.getElementById("loginBtn").disabled = false;
        document.getElementById("lockMsg").textContent = "";
      }, lockSec * 1000);
    }
    document.getElementById("pwdInput").value = "";
  }
}


function doLogout() {
  currentUser = null;
  selectedDates.clear();
  document.getElementById("loginOverlay").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("pwdInput").value = "";
  document.getElementById("errMsg").textContent = "";
}

function getMyRecords() {
  if (!allRecords) return [];
  if (currentUser.type === "admin") return allRecords;
  return allRecords.filter(function(r) {
    return currentUser.streets.indexOf(r.s) >= 0 && r.c === currentUser.city;
  });
}

function renderDashboard() {
  var isAdmin = currentUser.type === "admin";
  if (isAdmin) {
    document.getElementById("dashTitle").textContent = "管理视图 - 全部数据";
    document.getElementById("dashSub").textContent = "可查看所有网格长数据";
    document.getElementById("dashRank").textContent = "";
    document.getElementById("dashRankLabel").textContent = "";
  } else {
    document.getElementById("dashTitle").textContent = currentUser.leader;
    document.getElementById("dashSub").textContent = currentUser.city + " · " + currentUser.streets.length + "个街道";
    document.getElementById("dashRank").textContent = "第" + currentUser.rank + "/" + currentUser.total + "名";
    document.getElementById("dashRankLabel").textContent = currentUser.city + " 翻台排名";
  }
  // 获取日期列表
  var myRecs = getMyRecords();
  var dates = [];
  var dateSet = new Set();
  myRecs.forEach(function(r) { dateSet.add(r.d); });
  dates = Array.from(dateSet).sort();
  // 默认全选
  selectedDates = new Set(dates);
  renderDateTags(dates);
  renderContent();
}

function renderDateTags(dates) {
  var html = "<div class=\"dd-item all-item\"><input type=\"checkbox\" id=\"chkAll\" onchange=\"toggleAll()\" checked><label for=\"chkAll\">全选</label></div>";
  dates.forEach(function(d, i) {
    var label = d.substring(4, 6) + "/" + d.substring(6, 8);
    var checked = selectedDates.has(d) ? "checked" : "";
    html += "<div class=\"dd-item\"><input type=\"checkbox\" id=\"chk" + i + "\" data-d=\"" + d + "\" onchange=\"toggleDate('" + d + "')\" " + checked + "><label for=\"chk" + i + "\">" + label + "</label></div>";
  });
  document.getElementById("ddPanel").innerHTML = html;
  updateDdLabel();
}

function toggleDropdown() {
  var panel = document.getElementById("ddPanel");
  panel.classList.toggle("show");
}

document.addEventListener("click", function(e) {
  var dd = document.getElementById("dateDropdown");
  if (dd && !dd.contains(e.target)) {
    document.getElementById("ddPanel").classList.remove("show");
  }
});

function updateDdLabel() {
  var myRecs = getMyRecords();
  var allD = new Set();
  myRecs.forEach(function(r) { allD.add(r.d); });
  var n = selectedDates.size;
  var total = allD.size;
  var label = n === total ? "全部日期 (" + total + "天)" : "已选 " + n + "/" + total + " 天";
  document.getElementById("ddLabel").textContent = label;
  // 更新全选框
  var chkAll = document.getElementById("chkAll");
  if (chkAll) chkAll.checked = (n === total);
}

function toggleDate(d) {
  if (selectedDates.has(d)) selectedDates.delete(d);
  else selectedDates.add(d);
  // 更新对应checkbox
  var cbs = document.querySelectorAll("#ddPanel input[data-d]");
  cbs.forEach(function(cb) {
    cb.checked = selectedDates.has(cb.getAttribute("data-d"));
  });
  updateDdLabel();
  renderContent();
}

function toggleAll() {
  var myRecs = getMyRecords();
  var allD = new Set();
  myRecs.forEach(function(r) { allD.add(r.d); });
  var chkAll = document.getElementById("chkAll");
  if (chkAll && chkAll.checked) {
    selectedDates = new Set(allD);
  } else {
    selectedDates.clear();
  }
  var cbs = document.querySelectorAll("#ddPanel input[data-d]");
  cbs.forEach(function(cb) {
    cb.checked = selectedDates.has(cb.getAttribute("data-d"));
  });
  updateDdLabel();
  renderContent();
}


function renderContent() {
  var myRecs = getMyRecords();
  var filtered = myRecs.filter(function(r) { return selectedDates.has(r.d); });
  var isAdmin = currentUser.type === "admin";
  var nDays = selectedDates.size || 1;

  var streetAgg = {};
  filtered.forEach(function(r) {
    var key = isAdmin ? (r.l + "|" + r.c + "|" + r.s) : r.s;
    if (!streetAgg[key]) {
      streetAgg[key] = {s: r.s, c: r.c, l: r.l, av: 0, od: 0, av_n: 0,
        i1_w: 0, i3_w: 0, co_w: 0, np_w: 0, np_den: 0,
        di: 0, doc: 0, doo: 0, rev: 0, bc: 0, w_den: 0};

    var a = streetAgg[key];
    a.av += r.av; a.od += r.od; a.av_n += 1;
    a.i1_w += r.i1 * r.av / 100; a.i3_w += r.i3 * r.av / 100;
    a.co_w += r.co * r.av / 100;
    if (r.np > 0) { a.np_w += r.np * r.av / 100; a.np_den += r.av; }
    a.w_den += r.av;
    a.di += r.av * r.dr / 100;
    a.doc += r.av * r.dt;
    a.rev += r.av * r.bc / 100;
    a.bc += r.av * r.bc / 100;
  });

  // 计算汇总
  var totalAv = 0, totalOd = 0, totalAvN = 0;
  var rows = [];
  Object.keys(streetAgg).forEach(function(key) {
    var a = streetAgg[key];
    var avgAv = Math.round(a.av / a.av_n);
    var avgOd = Math.round(a.od / a.av_n);
    var turn = a.av > 0 ? (a.od / a.av).toFixed(4) : 0;
    var i1r = a.w_den > 0 ? (a.i1_w / a.w_den * 100).toFixed(1) : "0.0";
    var i3r = a.w_den > 0 ? (a.i3_w / a.w_den * 100).toFixed(1) : "0.0";
    var coR = a.w_den > 0 ? (a.co_w / a.w_den * 100).toFixed(1) : "0.0";
    var npR = a.np_den > 0 ? (a.np_w / a.np_den * 100).toFixed(1) : "0.0";
    // 调度出单率 & 调度翻台需要从原始记录重算
    var diIn = 0, diOutCar = 0, diOutOrd = 0, revenue = 0, bCost = 0;
    filtered.forEach(function(r) {
      var rkey = isAdmin ? (r.l + "|" + r.c + "|" + r.s) : r.s;
      if (rkey === key) {
        diIn += r.av * r.dr / 100;
        diOutCar += r.av * r.dr / 100;
        diOutOrd += r.av * r.dt;
        revenue += r.av;
        bCost += r.av * r.bc / 100;
      }
    });
    var drR = a.w_den > 0 ? (a.di / a.w_den * 100).toFixed(1) : "0.0";
    var dtR = a.w_den > 0 ? (a.doc / a.w_den).toFixed(4) : "0.0000";
    var bcR = a.w_den > 0 ? (a.bc / a.w_den * 100).toFixed(1) : "0.0";

    totalAv += avgAv; totalOd += a.od; totalAvN += a.av_n;
    rows.push({s: a.s, c: a.c, l: a.l, av: avgAv, od: avgOd,
      tu: parseFloat(turn), i1: parseFloat(i1r), i3: parseFloat(i3r),
      co: parseFloat(coR), np: parseFloat(npR),
      dr: parseFloat(drR), dt: parseFloat(dtR), bc: parseFloat(bcR)});
  });

  // 汇总（不再显示卡片）
  var sumAv = totalAvN > 0 ? Math.round(totalAv / Object.keys(streetAgg).length) : 0;
  var sumOd = totalAvN > 0 ? Math.round(totalOd / nDays) : 0;
  var sumTu = totalAv > 0 ? (totalOd / (totalAv)).toFixed(2) : "0.00";

  // 排序
  if (sortCol >= 0) {
    var cols = isAdmin ?
      ["l","c","s","av","od","tu","i1","i3","bc","co","dr","dt","np"] :
      ["s","av","od","tu","i1","i3","bc","co","dr","dt","np"];
    var sk = cols[sortCol];
    rows.sort(function(a, b) {
      var va = a[sk], vb = b[sk];
      if (typeof va === "string") return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });
  }

  // 渲染表格
  var thtml = "<thead><tr>";
  if (isAdmin) {
    thtml += "<th onclick=\"doSort(0)\">网格长<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(1)\">城市<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(2)\">街道<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(3)\">可用车<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(4)\">日均订单<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(5)\">翻台<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(6)\">1+闲置率%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(7)\">3+闲置率%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(8)\">B端成本%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(9)\">车品及格率%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(10)\">调度出单率%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(11)\">调度翻台<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(12)\">NPS%<span class=\"sort-arrow\">▼</span></th>";
  } else {
    thtml += "<th onclick=\"doSort(0)\">街道<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(1)\">可用车<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(2)\">日均订单<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(3)\">翻台<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(4)\">1+闲置率%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(5)\">3+闲置率%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(6)\">B端成本%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(7)\">车品及格率%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(8)\">调度出单率%<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(9)\">调度翻台<span class=\"sort-arrow\">▼</span></th>";
    thtml += "<th onclick=\"doSort(10)\">NPS%<span class=\"sort-arrow\">▼</span></th>";
  }
  thtml += "</tr></thead><tbody>";

  rows.forEach(function(r) {
    thtml += "<tr>";
    if (isAdmin) {
      thtml += "<td class=\"leader-col\">" + r.l + "</td>";
      thtml += "<td class=\"city-col\">" + r.c + "</td>";
    }
    thtml += "<td class=\"name-col\">" + r.s + "</td>";
    thtml += "<td>" + r.av + "</td>";
    thtml += "<td>" + r.od + "</td>";
    thtml += "<td>" + r.tu.toFixed(2) + "</td>";
    thtml += "<td>" + r.i1.toFixed(1) + "</td>";
    thtml += "<td>" + r.i3.toFixed(1) + "</td>";
    thtml += "<td>" + r.bc.toFixed(1) + "</td>";
    thtml += "<td>" + r.co.toFixed(1) + "</td>";
    thtml += "<td>" + r.dr.toFixed(1) + "</td>";
    thtml += "<td>" + r.dt.toFixed(2) + "</td>";
    thtml += "<td>" + r.np.toFixed(1) + "</td>";
    thtml += "</tr>";
  });
  thtml += "</tbody>";
  document.getElementById("dataTable").innerHTML = thtml;
}

function doSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderContent();
}

init();

</script></body></html>
