<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh}
.lp{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lb{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.lb h1{font-size:20px;margin-bottom:8px} .lb p{font-size:13px;color:#64748b;margin-bottom:20px}
.lb input{width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:10px;font-size:18px;text-align:center;letter-spacing:6px;outline:none}
.lb input:focus{border-color:#3b82f6}
.lb button{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:14px}
.lb .e{color:#ef4444;font-size:12px;margin-top:8px;min-height:16px}
.app{display:none;padding:14px;max-width:1100px;margin:0 auto}
.hd{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:12px;padding:16px 20px;color:#fff;margin-bottom:12px}
.hd h1{font-size:16px} .hd .sub{font-size:11px;opacity:.8;margin-top:4px}
.flt{background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border:1px solid #e2e8f0}
.flt select{padding:5px 8px;border:1px solid #cbd5e0;border-radius:5px;font-size:11px}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #e2e8f0}
.card .big{font-size:36px;font-weight:900;margin-bottom:4px}
.card .lbl{font-size:11px;color:#64748b}
.ms{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.mi{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px;text-align:center;min-width:65px}
.mi .v{font-size:13px;font-weight:700} .mi .l{font-size:9px;color:#64748b;margin-top:1px}
.mi.ref{border-style:dashed;opacity:.7}
.tb{background:#fff;border-radius:8px;overflow-x:auto;border:1px solid #e2e8f0}
.tb table{width:100%;border-collapse:collapse;font-size:11px}
.tb th{background:#1e3054;color:#e2e8f0;padding:8px 5px;font-size:9.5px;white-space:nowrap}
.tb td{padding:6px 5px;border-bottom:1px solid #f1f5f9;text-align:center;white-space:nowrap}
.tb tr:nth-child(even){background:#fafbfc}
.g{color:#059669;font-weight:600} .o{color:#d97706;font-weight:600} .r{color:#dc2626;font-weight:600}
@media(max-width:600px){.ms{gap:4px}.mi{min-width:55px;padding:4px 6px}.mi .v{font-size:11px}}
</style></head><body>
<div class="lp" id="lp"><div class="lb">

function dob(s){var b=atob(s);var u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return JSON.parse(pako.inflate(u,{to:'string'}));}

var _data=null,_isM=false,_name='';
// 锁定
var _f=+localStorage.getItem('_f')||0,_lu=+localStorage.getItem('_lu')||0;

async function sha12(s){var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(buf)).map(x=>x.toString(16).padStart(2,'0')).join('').substring(0,12);}

async function doLogin(){
  if(_lu>Date.now()/1000){document.getElementById('em').textContent='请'+Math.ceil(_lu-Date.now()/1000)+'秒后重试';return;}
  var pwd=document.getElementById('pi').value.trim();
  if(pwd.length!==6){document.getElementById('em').textContent='请输入6位密码';return;}
  var h=await sha12(pwd);
  // 管理员
  if(h===P.mh){_isM=true;_name='管理员';_data=null;_f=0;localStorage.setItem('_f','0');showMaster();return;}
  // 个人
  if(P.ph[h]){_isM=false;_name=P.ph[h];_data=dob(P.b[h]);_f=0;localStorage.setItem('_f','0');showPersonal();return;}
  _f++;localStorage.setItem('_f',String(_f));
  if(_f>=5){var t=[60,180,300,600,1800,3600][Math.min(_f-5,5)];_lu=Date.now()/1000+t;localStorage.setItem('_lu',String(Math.floor(_lu)));document.getElementById('em').textContent='错误过多，锁定'+t+'秒';}
  else{document.getElementById('em').textContent='密码错误('+_f+'/5)';}
}

function showMaster(){
  document.getElementById('lp').style.display='none';
  document.getElementById('ap').style.display='block';
  document.getElementById('at').textContent='网格长考核达成（管理视图）';
  document.getElementById('ai').textContent=P.dates.length+'天 · 点击网格长查看详情';
  var idx=dob(P.mi);
  var h='<table><tr><th>网格长</th><th>城市</th><th>街道数</th><th></th></tr>';
  idx.forEach(function(m){h+='<tr><td style="text-align:left;padding-left:10px;font-weight:600">'+m.l+'</td><td>'+m.c+'</td><td>'+m.s+'</td><td><button onclick="viewLeader(\''+m.l.replace(/'/g,"\\'")+'\')" style="padding:3px 8px;background:#2563eb;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:10px">查看</button></td></tr>';});
  h+='</table>';
  document.getElementById('tb').innerHTML=h;
  document.getElementById('sc').innerHTML='<div class="lbl">选择网格长查看街道明细</div>';
  document.getElementById('fd').innerHTML='';
}
function viewLeader(name){
  if(!P.mb[name]){alert('无数据');return;}
  _data=dob(P.mb[name]);_name=name;_isM=false;showPersonal();
}

function showPersonal(){
  document.getElementById('lp').style.display='none';
  document.getElementById('ap').style.display='block';
  document.getElementById('at').textContent=_name+' · 考核达成';
  document.getElementById('ai').textContent='数据截至 '+P.dates[P.dates.length-1].replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3');
  var ds=P.dates;
  var h='<option value="all">月聚合('+ds.length+'天)</option>';
  ds.slice().reverse().forEach(function(d){h+='<option value="'+d+'">'+d.substring(4,6)+'-'+d.substring(6)+'</option>';});
  document.getElementById('fd').innerHTML=h;
  render();
}

function render(){
  var fdt=document.getElementById('fd').value;
  var data=_data;
  if(fdt!=='all') data=data.filter(function(r){return r[0]===fdt;});
  if(!data||!data.length){document.getElementById('sc').innerHTML='<div class="lbl">无数据</div>';document.getElementById('tb').innerHTML='';return;}
  // 聚合所有街道
  var days=new Set(data.map(r=>r[0])).size||1;
  var tot={av:0,ord:0,i3s:0,i3n:0,i1s:0,i1n:0,cks:0,ckn:0,dos:0,dts:0,dc:0,ns:0,nn:0,bs:0,bn:0};
  data.forEach(function(r){tot.av+=r[4];tot.ord+=r[5];tot.i3s+=r[7]*r[4];tot.i3n+=r[4];tot.i1s+=r[8]*r[4];tot.i1n+=r[4];tot.cks+=r[9]*r[4];tot.ckn+=r[4];if(r[10]>0){tot.dos+=r[10];tot.dc++;}if(r[11]>0){tot.dts+=r[11];tot.dc++;}if(r[12]!==null){tot.ns+=r[12]*r[4];tot.nn+=r[4];}tot.bs+=r[13]*r[4];tot.bn+=r[4];});
  var turn=tot.av>0?tot.ord/tot.av:0;
  var i3r=tot.i3n>0?tot.i3s/tot.i3n:0;
  var i1r=tot.i1n>0?tot.i1s/tot.i1n:0;
  var ck=tot.ckn>0?tot.cks/tot.ckn:0;
  var dout=tot.dc>0?tot.dos/tot.dc:0;// 简化
  var dturn=tot.dc>0?tot.dts/tot.dc:0;
  var nps=tot.nn>0?tot.ns/tot.nn:null;
  var br=tot.bn>0?tot.bs/tot.bn:0;
  var dord=tot.ord/days;
  // 得分(简化)
  var score=75;// placeholder
  var sc=score>=80?'#10b981':(score>=60?'#f59e0b':'#ef4444');
  var ch='<div class="big" style="color:'+sc+'">'+turn.toFixed(2)+' <span style="font-size:14px;color:#64748b">翻台</span></div>';
  ch+='<div class="lbl">日均订单 '+Math.round(dord)+' · 可用车 '+Math.round(tot.av/days)+' · '+days+'天聚合</div>';
  ch+='<div class="ms">';
  ch+='<div class="mi"><div class="v">'+i3r.toFixed(1)+'%</div><div class="l">3+闲置率</div></div>';
  ch+='<div class="mi"><div class="v">'+i1r.toFixed(1)+'%</div><div class="l">1+闲置率</div></div>';
  ch+='<div class="mi"><div class="v">'+br.toFixed(1)+'%</div><div class="l">B端成本</div></div>';
  ch+='<div class="mi"><div class="v">'+ck.toFixed(1)+'%</div><div class="l">车品及格率</div></div>';
  ch+='<div class="mi"><div class="v">'+dout.toFixed(1)+'%</div><div class="l">调度出单</div></div>';
  ch+='<div class="mi"><div class="v">'+dturn.toFixed(2)+'</div><div class="l">调度翻台</div></div>';
  ch+='<div class="mi"><div class="v">'+(nps!==null?nps.toFixed(1)+'%':'-')+'</div><div class="l">NPS</div></div>';
  ch+='</div>';
  document.getElementById('sc').innerHTML=ch;
  // 按街道表格
  var byS={};
  data.forEach(function(r){var s=r[3];if(!byS[s])byS[s]={av:0,ord:0,i3s:0,i3n:0,i1s:0,i1n:0,cks:0,ckn:0,dos:0,dts:0,dc:0,ns:0,nn:0,bs:0,bn:0,days:new Set()};var o=byS[s];o.av+=r[4];o.ord+=r[5];o.i3s+=r[7]*r[4];o.i3n+=r[4];o.i1s+=r[8]*r[4];o.i1n+=r[4];o.cks+=r[9]*r[4];o.ckn+=r[4];if(r[10]>0){o.dos+=r[10];o.dc++;}if(r[11]>0){o.dts+=r[11];}if(r[12]!==null){o.ns+=r[12]*r[4];o.nn+=r[4];}o.bs+=r[13]*r[4];o.bn+=r[4];o.days.add(r[0]);});
  var th='<table><thead><tr><th>街道</th><th>可用车</th><th>日均订单</th><th>翻台</th><th>1+闲置</th><th>3+闲置</th><th>B成本</th><th>车品</th><th>出单率</th><th>调度翻台</th><th>NPS</th></tr></thead><tbody>';
  Object.keys(byS).sort().forEach(function(s){var o=byS[s];var d2=o.days.size||1;
    th+='<tr><td style="text-align:left;font-weight:600;padding-left:6px">'+s+'</td>';
    th+='<td>'+Math.round(o.av/d2)+'</td>';
    th+='<td>'+Math.round(o.ord/d2)+'</td>';
    th+='<td>'+(o.av>0?(o.ord/o.av).toFixed(2):'0')+'</td>';
    th+='<td>'+(o.i1n>0?(o.i1s/o.i1n).toFixed(1):'0')+'%</td>';
    th+='<td>'+(o.i3n>0?(o.i3s/o.i3n).toFixed(1):'0')+'%</td>';
    th+='<td>'+(o.bn>0?(o.bs/o.bn).toFixed(1):'0')+'%</td>';
    th+='<td>'+(o.ckn>0?(o.cks/o.ckn).toFixed(1):'0')+'%</td>';
    th+='<td>'+(o.dc>0?(o.dos/o.dc).toFixed(1):'0')+'%</td>';
    th+='<td>'+(o.dc>0?(o.dts/o.dc).toFixed(2):'0')+'</td>';
    th+='<td>'+(o.nn>0?(o.ns/o.nn).toFixed(1):'-')+'</td></tr>';
  });
  th+='</tbody></table>';
  document.getElementById('tb').innerHTML=th;
}
document.getElementById('pi').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script></body></html>
