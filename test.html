<!DOCTYPE html><html><head><meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head><body>
<h3>加密解密测试</h3>
<button onclick="testDecrypt()">测试解密</button>
<pre id="out"></pre>
<script>
var ENC="U2FsdGVkX1+xQvlKDTTBXkMVQsdBN5UjE+gPG2CT2D4clOKvYbMK0KuU0xu0EX+vA1cIlsTFgchoqCXmffx+mg==";
function testDecrypt(){
  try{
    var dec=CryptoJS.AES.decrypt(ENC,"839201");
    var txt=dec.toString(CryptoJS.enc.Utf8);
    document.getElementById("out").textContent="成功: "+txt;
  }catch(e){
    document.getElementById("out").textContent="失败: "+e.message;
  }
}
</script></body></html>
